version: '3.8'

services:
  # WebSocket Hub - 純粹的事件中繼伺服器
  socket-hub:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: socket-hub
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/healthz', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Python 報價服務 - Shioaji 串流資料
  python-market-data:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-market-data
    depends_on:
      socket-hub:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - GATEWAY_URL=http://socket-hub:3001
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
    restart: always
    networks:
      - trading-network
    volumes:
      - /Users/julian/Downloads/ca:/app/ca:ro

  # React Frontend - 市場資料顯示
  frontend:
    build:
      context: ../dogbro-index-client
      dockerfile: Dockerfile
    container_name: dogbro-frontend
    depends_on:
      - socket-hub
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_GATEWAY_URL=http://localhost:3001
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - trading-network
    stdin_open: true
    tty: true

networks:
  trading-network:
    driver: bridge
